  <ellipse cx="17" cy="9" rx="3" ry="3.5" fill="#0d0d0f"/>
  <!-- Кляксы красок -->
  <circle cx="24" cy="11" r="2" fill="#C41E3A"/>
  <circle cx="25" cy="17" r="1.8" fill="#FFD700"/>
  <circle cx="22" cy="22" r="1.8" fill="#2563EB"/>
  <circle cx="16" cy="23" r="1.5" fill="#16A34A"/>
  <circle cx="19" cy="15" r="1.2" fill="#E8E6E3"/>
  <!-- Кисть 1 (слева): ручка -->
  <rect x="2" y="9" width="12" height="2.2" rx="0.5" fill="#5D4E37" stroke="#3d3528" stroke-width="0.4"/>
